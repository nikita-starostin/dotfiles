# Get IDE like autocomplete for the .toml (just that filed you reading right now) based on that schema
"$schema" = 'https://starship.rs/config-schema.json'

# How the promt should look like in terminal
# every item could be customized separately in sections below
format = """
$username\
$git_branch\
$line_break\
$time\
$line_break\
$directory\
$line_break\
$character"""

# how to format directory
[directory]
format='[$path]($style)'
truncation_length = 10
truncate_to_repo = false
use_logical_path = false

# how to format git status
[git_status]
format='$up_to_date $untracked $modified $renamed $deleted $staged $diverged $ahead $behind'
conflicted = '🏳'
ahead = '🏎💨'
behind = '😰'
diverged = '😵'
up_to_date = '✓'
untracked = '[untracked files: ${count}](red)'
stashed = '📦'
modified = '[modified files: ${count}](yellow)'
staged = '[++\($count\)](green)'
renamed = '[renamed files: ${count}](blue)'
deleted = '[deleted files: ${count}](red)'

# Replace the '❯' symbol in the prompt with '➜'
[character] # The name of the module we are configuring is 'character'
success_symbol = '[➜](bold green)' # The 'success_symbol' segment is being set to '➜' with the color 'bold green'
error_symbol = '[➜](bold red)' # The 'success_symbol' segment is being set to '➜' with the color 'bold green'

# format for the time
[time]
disabled = false
format = 'at [$time]($style) '
time_format = '%v %T'
utc_time_offset = '+3'

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

# How to format azure
[azure]
disabled = false
format = 'on [$symbol($subscription)]($style) '
symbol = '󰠅 '
style = 'blue bold'
